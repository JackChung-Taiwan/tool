<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Image Background Remover</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--blue2:#1d4ed8;--dark:#111827;--green:#16a34a;--amber:#f59e0b;--red:#dc2626;--shadow:0 18px 45px rgba(15,23,42,.08);--r:22px}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(180deg,#eaf2ff 0,#f8fafc 420px,#f5f7fb 100%);color:var(--text)}header{width:min(1240px,94%);margin:auto;text-align:center;padding:42px 0 22px}h1{margin:0;font-size:clamp(2.1rem,5.2vw,4.7rem);font-weight:950;letter-spacing:.01em}header p{margin:14px 0 0;color:var(--muted);font-size:clamp(1rem,2vw,1.35rem)}main{width:min(1240px,94%);margin:0 auto 48px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:20px 0 22px}.step,.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.step{padding:18px 20px;text-align:left;font-size:1.05rem;font-weight:800}.step b{color:var(--blue);display:block;margin-bottom:6px}.card{padding:24px;margin:22px 0}h2{margin:0 0 18px;font-size:1.55rem}.search{display:grid;grid-template-columns:1fr auto auto;gap:12px}input,button{font:inherit;border-radius:16px}input{border:1px solid var(--line);padding:15px 16px;background:#fff;outline:none}input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{border:0;padding:15px 20px;background:var(--blue);color:#fff;font-weight:900;cursor:pointer;transition:.15s transform,.15s filter}button:hover{filter:brightness(.96);transform:translateY(-1px)}button:disabled{opacity:.48;cursor:not-allowed;transform:none}.dark{background:var(--dark)}.green{background:var(--green)}.amber{background:var(--amber)}.red{background:var(--red)}.status{margin-top:14px;border-radius:16px;padding:13px 15px;font-weight:850;line-height:1.45;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}.status.ok{background:#ecfdf5;color:#065f46;border-color:#bbf7d0}.status.err{background:#fef2f2;color:#991b1b;border-color:#fecaca}.status.warn{background:#fffbeb;color:#92400e;border-color:#fde68a}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.batch{color:var(--muted);font-weight:900}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.pic{position:relative;overflow:hidden;border:2px solid var(--line);border-radius:18px;background:#fff;transition:.15s}.pic:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(15,23,42,.10)}.pic.selected{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.14)}.tag{display:none;position:absolute;z-index:2;top:10px;left:10px;background:var(--blue);color:#fff;border-radius:999px;padding:6px 10px;font-size:.8rem;font-weight:900}.selected .tag{display:block}.thumb{height:190px;background:#eef2f7;display:flex;align-items:center;justify-content:center;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}.info{padding:13px}.info h3{margin:0 0 8px;font-size:.98rem;line-height:1.3;min-height:40px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta{color:var(--muted);font-size:.86rem;line-height:1.55}.actions{display:grid;gap:8px;padding:0 13px 13px}.actions a{text-align:center;text-decoration:none;border-radius:13px;background:#f3f4f6;color:#111827;padding:10px;font-weight:900}.actions button{padding:11px}.work{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}.panel-title{padding:12px 15px;background:#f8fafc;border-bottom:1px solid var(--line);font-weight:900;display:flex;justify-content:space-between;color:#344054}.view{min-height:330px;padding:16px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted)}.checker{background-color:#fff;background-image:linear-gradient(45deg,#d1d5db 25%,transparent 25%),linear-gradient(-45deg,#d1d5db 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#d1d5db 75%),linear-gradient(-45deg,transparent 75%,#d1d5db 75%);background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}.view img,.view canvas{max-width:100%;max-height:520px;border-radius:14px;box-shadow:0 10px 26px rgba(15,23,42,.16)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.mini{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.mini h3{margin:0 0 10px;font-size:1.08rem}.hint{color:var(--muted);line-height:1.6;margin:0 0 12px}.range{display:grid;grid-template-columns:64px 1fr 42px;gap:8px;align-items:center}.chip{display:inline-block;width:28px;height:28px;border:1px solid #111827;border-radius:8px;background:#fff;vertical-align:middle}.attr{border:1px solid var(--line);border-radius:18px;background:#f8fafc;padding:16px;line-height:1.8;word-break:break-word}.attr code{display:block;background:#111827;color:#e5e7eb;border-radius:14px;padding:13px;white-space:pre-wrap;margin-top:10px}.spin{display:inline-block;width:20px;height:20px;border:4px solid #bfdbfe;border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;vertical-align:-5px;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:1050px){.grid{grid-template-columns:repeat(3,1fr)}.steps{grid-template-columns:repeat(3,1fr)}}@media(max-width:760px){header{text-align:left}.steps,.search,.grid,.work,.tools{grid-template-columns:1fr}button{width:100%}.card{padding:18px}.view{min-height:250px}.thumb{height:230px}}
</style>
</head>
<body>
<header>
  <h1>CC Image Background Remover</h1>
  <p>搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
</header>
<main>
  <section class="steps">
    <div class="step"><b>Step 1</b>搜尋圖片</div>
    <div class="step"><b>Step 2</b>選擇圖片</div>
    <div class="step"><b>Step 3</b>去背下載</div>
  </section>

  <section class="card">
    <h2>搜尋圖片</h2>
    <div class="search">
      <input id="keywordInput" value="cat" placeholder="輸入關鍵字，例如 cat、robot、flower">
      <button onclick="searchImages()">搜尋圖片</button>
      <button class="dark" onclick="changeBatch()">換一批</button>
    </div>
    <div id="statusBox" class="status">輸入關鍵字開始搜尋</div>
  </section>

  <section class="card">
    <div class="top"><h2>5 張候選圖片</h2><span id="batchLabel" class="batch">尚未搜尋</span></div>
    <div id="imageGrid" class="grid"><div class="hint">搜尋後會顯示圖片</div></div>
  </section>

  <section class="card">
    <h2>去背與下載</h2>
    <div class="work">
      <div class="panel"><div class="panel-title"><span>原圖</span><span id="selectedSize">尚未選圖</span></div><div id="selectedPreview" class="view">請先選擇圖片</div></div>
      <div class="panel"><div class="panel-title"><span>PNG 結果</span><span id="resultSize">透明背景</span></div><div id="resultPreview" class="view checker">去背結果會顯示在這裡</div></div>
    </div>
    <div class="row">
      <button id="removeBtn" class="green" onclick="removeSelectedImageBackground()" disabled>一鍵去背</button>
      <button id="downloadBtn" class="amber" onclick="downloadPNG()" disabled>下載 PNG</button>
      <button class="dark" onclick="resetSelection()">重新選圖</button>
    </div>
    <div class="tools">
      <div class="mini"><h3>AI 狀態</h3><div id="aiStatus" class="status">尚未開始</div></div>
      <div class="mini"><h3>備用去背</h3><p class="hint">AI 失敗時可用，適合白底或單色背景。</p><div class="range"><label>容差</label><input id="toleranceRange" type="range" min="0" max="100" value="35" oninput="toleranceValue.textContent=this.value"><b id="toleranceValue">35</b></div><p class="hint">背景色：<span id="pickedColorChip" class="chip"></span> <span id="pickedColorText">尚未選色</span></p><div class="row"><button class="dark" onclick="enablePickColor()">點選背景色</button><button class="amber" onclick="fallbackWhiteRemove()">白底去背</button><button class="amber" onclick="fallbackSelectedColorRemove()">選色去背</button></div></div>
    </div>
  </section>

  <section class="card">
    <h2>授權標示</h2>
    <div id="attributionBox" class="attr">尚未選擇圖片</div>
    <div class="row"><button class="dark" onclick="copyAttribution()">複製標示</button></div>
  </section>
</main>
<script type="module">
import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
window.removeBackgroundAI = removeBackground;
</script>
<script>
let keyword='',page=1,batch=0,currentImages=[],selectedImage=null,selectedBlob=null,resultBlob=null,pickMode=false,pickedColor=null;
const $=id=>document.getElementById(id);
function showStatus(msg,type=''){const el=$('statusBox');el.className='status '+type;el.innerHTML=msg}
function showAI(msg,type=''){const el=$('aiStatus');el.className='status '+type;el.innerHTML=msg}
function escapeHTML(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}

// 搜尋圖片
async function searchImages(){keyword=$('keywordInput').value.trim();if(!keyword)return showStatus('請先輸入關鍵字','err');page=1;batch=1;resetSelection();await loadBatch()}

// 換一批圖片
async function changeBatch(){if(!keyword)return showStatus('請先搜尋圖片','warn');batch++;resetSelection();await loadBatch()}

async function loadBatch(){showStatus('<span class="spin"></span>搜尋中');let found=[],guard=0;while(found.length<5&&guard<8){guard++;const wiki=await fetchWikimediaImages(keyword,page).catch(()=>[]);found.push(...filterImagesBySize(wiki));if(found.length<5){const open=await fetchOpenverseImages(keyword,page).catch(()=>[]);found.push(...filterImagesBySize(open))}page++}currentImages=dedupe(found).slice(0,5);$('batchLabel').textContent=currentImages.length?`第 ${batch} 批`:'尚無結果';renderImageCards(currentImages);showStatus(currentImages.length?`找到 ${currentImages.length} 張圖片`:'找不到圖片',currentImages.length?'ok':'err')}

// Wikimedia Commons API
async function fetchWikimediaImages(q,p=1){const limit=45,offset=(p-1)*limit;const url=new URL('https://commons.wikimedia.org/w/api.php');Object.entries({origin:'*',action:'query',format:'json',generator:'search',gsrsearch:q,gsrnamespace:'6',gsrlimit:limit,gsroffset:offset,prop:'imageinfo',iiprop:'url|size|mime|extmetadata'}).forEach(([k,v])=>url.searchParams.set(k,v));const res=await fetch(url);if(!res.ok)throw new Error('wiki api');const data=await res.json();const pages=data.query?.pages?Object.values(data.query.pages):[];return pages.map(pg=>{const info=pg.imageinfo?.[0]||{},meta=info.extmetadata||{};const clean=v=>{const d=document.createElement('div');d.innerHTML=v||'';return d.textContent.trim()};return{title:clean(meta.ObjectName?.value||pg.title||'Untitled'),creator:clean(meta.Artist?.value||'Unknown'),license:clean(meta.LicenseShortName?.value||meta.UsageTerms?.value||'Creative Commons / Public Domain'),licenseUrl:meta.LicenseUrl?.value||'',imageUrl:info.url||'',thumbnailUrl:info.url||'',sourceUrl:info.descriptionurl||'',width:+info.width||0,height:+info.height||0,provider:'Wikimedia Commons'}}).filter(x=>x.imageUrl)}

// Openverse API
async function fetchOpenverseImages(q,p=1){const url=new URL('https://api.openverse.org/v1/images/');url.searchParams.set('q',q);url.searchParams.set('page',p);url.searchParams.set('page_size','30');url.searchParams.set('mature','false');const res=await fetch(url);if(!res.ok)throw new Error('openverse api');const data=await res.json();return(data.results||[]).map(it=>({title:it.title||'Untitled',creator:it.creator||'Unknown',license:it.license||'Creative Commons / Public Domain',licenseUrl:it.license_url||'',imageUrl:it.url||it.thumbnail||'',thumbnailUrl:it.thumbnail||it.url||'',sourceUrl:it.foreign_landing_url||it.url||'',width:+it.width||0,height:+it.height||0,provider:'Openverse'})).filter(x=>x.imageUrl)}

// 尺寸過濾
function filterImagesBySize(list){return list.filter(x=>x.width>=800&&x.height>=600)}
function dedupe(list){const map=new Map();list.forEach(x=>{if(x.imageUrl&&!map.has(x.imageUrl))map.set(x.imageUrl,x)});return[...map.values()]}

// 顯示圖片卡片
function renderImageCards(list){const grid=$('imageGrid');if(!list.length){grid.innerHTML='<div class="hint">沒有可顯示的圖片</div>';return}grid.innerHTML=list.map((x,i)=>`<article id="card-${i}" class="pic"><div class="tag">已選取</div><div class="thumb"><img crossorigin="anonymous" loading="lazy" src="${escapeHTML(x.thumbnailUrl)}" alt="${escapeHTML(x.title)}"></div><div class="info"><h3>${escapeHTML(x.title)}</h3><div class="meta">${escapeHTML(x.license)}<br>${x.width} × ${x.height}</div></div><div class="actions"><button onclick="selectImage(${i})">選擇</button><a href="${escapeHTML(x.sourceUrl)}" target="_blank" rel="noopener">來源</a></div></article>`).join('')}

// 選擇圖片
async function selectImage(i){selectedImage=currentImages[i];selectedBlob=null;resultBlob=null;document.querySelectorAll('.pic').forEach(c=>c.classList.remove('selected'));$('card-'+i).classList.add('selected');$('removeBtn').disabled=false;$('downloadBtn').disabled=true;renderAttribution();showAI('已選取圖片','ok');showStatus('已選取圖片','ok');await loadSelectedImage()}

// 載入選定圖片
async function loadSelectedImage(){try{selectedBlob=await fetchImageBlob(selectedImage.imageUrl);const url=URL.createObjectURL(selectedBlob);$('selectedPreview').innerHTML=`<img id="sourceImage" src="${url}">`;$('selectedSize').textContent=`${selectedImage.width} × ${selectedImage.height}`}catch(e){$('removeBtn').disabled=true;showStatus('圖片無法處理，請換一張','err');showAI('圖片無法處理','err')}}
async function fetchImageBlob(url){const res=await fetch(url,{mode:'cors'});if(!res.ok)throw new Error('image cors');const blob=await res.blob();if(!blob.type.startsWith('image/'))throw new Error('not image');return blob}

// 一鍵 AI 去背
async function removeSelectedImageBackground(){if(!selectedBlob)return showAI('請先選擇圖片','warn');if(!window.removeBackgroundAI)return showAI('AI 載入失敗','err');$('removeBtn').disabled=true;$('removeBtn').textContent='去背中...';showAI('<span class="spin"></span>去背中');try{resultBlob=await window.removeBackgroundAI(selectedBlob);showRemovedResult(resultBlob);$('downloadBtn').disabled=false;showAI('去背完成','ok');showStatus('去背完成','ok')}catch(e){showAI('AI 去背失敗','err');showStatus('AI 去背失敗','err')}finally{$('removeBtn').disabled=false;$('removeBtn').textContent='一鍵去背'}}

// 顯示去背結果
function showRemovedResult(blob){const url=URL.createObjectURL(blob);const img=new Image();img.onload=()=>{$('resultSize').textContent=`${img.naturalWidth} × ${img.naturalHeight}`};img.src=url;$('resultPreview').innerHTML='';$('resultPreview').appendChild(img)}

// 下載 PNG
function downloadPNG(){if(!resultBlob)return showStatus('尚未去背','warn');const url=URL.createObjectURL(resultBlob);const a=document.createElement('a');a.href=url;a.download='cc-image-removed-background.png';a.click();URL.revokeObjectURL(url);showStatus('已下載 PNG','ok')}

// 複製授權標示
async function copyAttribution(){if(!selectedImage)return showStatus('尚未選擇圖片','warn');try{await navigator.clipboard.writeText(attributionText());showStatus('已複製標示','ok')}catch(e){showStatus('複製失敗','err')}}
function renderAttribution(){if(!selectedImage){$('attributionBox').textContent='尚未選擇圖片';return}$('attributionBox').innerHTML=`圖片：${escapeHTML(selectedImage.title)}<br>作者：${escapeHTML(selectedImage.creator)}<br>授權：${escapeHTML(selectedImage.license)}<br>來源：<a href="${escapeHTML(selectedImage.sourceUrl)}" target="_blank" rel="noopener">查看來源</a><br>平台：${escapeHTML(selectedImage.provider)}<code>${escapeHTML(attributionText())}</code>`}
function attributionText(){return selectedImage?`圖片：${selectedImage.title}\n作者：${selectedImage.creator}\n授權：${selectedImage.license}\n來源：${selectedImage.sourceUrl}\n平台：${selectedImage.provider}`:''}

// 白底去背
async function fallbackWhiteRemove(){await canvasRemove({r:255,g:255,b:255})}

// 啟用點選背景色
function enablePickColor(){if(!selectedBlob)return showAI('請先選擇圖片','warn');pickMode=true;$('selectedPreview').style.cursor='crosshair';$('selectedPreview').onclick=pickBackgroundColor;showAI('點選背景色','warn')}

// 取得點選背景色
function pickBackgroundColor(e){const img=$('sourceImage');if(!pickMode||!img)return;const rect=img.getBoundingClientRect();const x=Math.floor((e.clientX-rect.left)*img.naturalWidth/rect.width);const y=Math.floor((e.clientY-rect.top)*img.naturalHeight/rect.height);const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;ctx.drawImage(img,0,0);const d=ctx.getImageData(x,y,1,1).data;pickedColor={r:d[0],g:d[1],b:d[2]};$('pickedColorChip').style.background=`rgb(${d[0]},${d[1]},${d[2]})`;$('pickedColorText').textContent=`RGB(${d[0]}, ${d[1]}, ${d[2]})`;pickMode=false;$('selectedPreview').onclick=null;$('selectedPreview').style.cursor='default';showAI('已選取背景色','ok')}

// 選色去背
async function fallbackSelectedColorRemove(){if(!pickedColor)return showAI('請先點選背景色','warn');await canvasRemove(pickedColor)}
async function canvasRemove(target){if(!selectedBlob)return showAI('請先選擇圖片','warn');try{const img=await blobToImage(selectedBlob),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;ctx.drawImage(img,0,0);const imageData=ctx.getImageData(0,0,canvas.width,canvas.height),data=imageData.data,t=25+(+$('toleranceRange').value)*4;for(let i=0;i<data.length;i+=4){const dist=Math.hypot(data[i]-target.r,data[i+1]-target.g,data[i+2]-target.b);if(dist<t)data[i+3]=dist<t*.55?0:Math.floor(255*dist/t)}ctx.putImageData(imageData,0,0);canvas.toBlob(blob=>{resultBlob=blob;showRemovedResult(blob);$('downloadBtn').disabled=false;showAI('備用去背完成','ok');showStatus('去背完成','ok')},'image/png')}catch(e){showAI('備用去背失敗','err')}}
function blobToImage(blob){return new Promise((resolve,reject)=>{const url=URL.createObjectURL(blob),img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=url})}

// 重設選取
function resetSelection(){selectedImage=null;selectedBlob=null;resultBlob=null;pickedColor=null;pickMode=false;document.querySelectorAll('.pic').forEach(c=>c.classList.remove('selected'));$('selectedPreview').innerHTML='請先選擇圖片';$('resultPreview').innerHTML='去背結果會顯示在這裡';$('selectedSize').textContent='尚未選圖';$('resultSize').textContent='透明背景';$('removeBtn').disabled=true;$('downloadBtn').disabled=true;$('pickedColorChip').style.background='#fff';$('pickedColorText').textContent='尚未選色';renderAttribution();showAI('尚未開始')}
$('keywordInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchImages()});
</script>
</body>
</html>
